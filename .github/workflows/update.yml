name: Daily Price Update

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run price scraper
        run: python scraper.py
      - name: Commit updated index.html
        run: |
          git config user.name  "apple-deals-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily price update $(date -u '+%Y-%m-%d')"
          git push
